# .github/workflows/deploy.yml

name: ShopAPI — CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:

  # ──────────────────────────────────────────────────────────
  # TESTS
  # ──────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_DB: shopapi_db
          POSTGRES_USER: shopapi_user
          POSTGRES_PASSWORD: shopapi_pass

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

        ports:
          - 5432:5432

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run Django Tests
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: True

          ALLOWED_HOSTS: localhost,127.0.0.1

          DB_NAME: shopapi_db
          DB_USER: shopapi_user
          DB_PASSWORD: shopapi_pass
          DB_HOST: localhost
          DB_PORT: 5432

          TEST_DB_NAME: shopapi_test_db

          CORS_ALLOW_ALL_ORIGINS: True

        run: |
          uv run python manage.py test store --verbosity=2

  # ──────────────────────────────────────────────────────────
  # DEPLOY
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure VM
    needs: test
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

        run: |

          ssh $VPS_USER@$VPS_HOST << ENDSSH

            set -e

            echo "────────────────────────────────"
            echo "SHOPAPI DEPLOY START"
            echo "────────────────────────────────"

            echo ""
            echo "1. Entrando al proyecto"
            echo "DEPLOY_PATH: $DEPLOY_PATH"

            cd $DEPLOY_PATH

            echo ""
            echo "Directorio actual:"
            pwd

            echo ""
            echo "Contenido:"
            ls -la

            echo ""
            echo "2. Verificando repositorio Git"

            git status

            echo ""
            echo "3. Actualizando código"

            git fetch origin

            git reset --hard origin/main

            echo ""
            echo "4. Instalando dependencias"

            uv sync --frozen

            echo ""
            echo "5. Aplicando migraciones"

            uv run python manage.py migrate --noinput

            echo ""
            echo "6. Recolectando archivos estáticos"

            uv run python manage.py collectstatic --noinput --clear

            echo ""
            echo "7. Reiniciando servicios"

            sudo systemctl restart gunicorn-shopapi

            sudo systemctl restart nginx

            echo ""
            echo "8. Verificando API"

            sleep 5

            curl -sf http://127.0.0.1/api/health/ \
              && echo "API ONLINE" \
              || (echo "API FAILED" && exit 1)

            echo ""
            echo "────────────────────────────────"
            echo "DEPLOY COMPLETADO"
            echo "────────────────────────────────"

          ENDSSH